name: Bug 报告
description: 报告一个 Bug 以帮助我们改进
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        感谢您报告 Bug！请填写以下信息帮助我们定位问题。

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 清晰描述遇到的问题
      placeholder: "当我尝试...时，发生了..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 如何复现这个 Bug
      placeholder: |
        1. 进入 '...'
        2. 点击 '....'
        3. 滚动到 '....'
        4. 看到错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 您期望发生什么
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: 受影响的组件
      multiple: true
      options:
        - Flutter App (Android)
        - Flutter App (iOS)
        - Flutter App (Web)
        - Web Client
        - Auth Service
        - Push Service
        - Media Proxy
        - Admin Service
        - Docker/K8s
        - CI/CD
        - Other
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: 严重程度
      options:
        - Critical - 阻塞生产环境
        - High - 严重影响用户体验
        - Medium - 影响部分功能
        - Low - 轻微问题
        - Enhancement - 改进建议
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 版本信息
      description: 应用或服务的版本号
      placeholder: "v1.0.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: 操作系统/环境
      description: 操作系统、浏览器版本等
      placeholder: "Windows 11 / Chrome 120 / iOS 17"

  - type: textarea
    id: logs
    attributes:
      label: 日志信息
      description: 相关的错误日志
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: 截图
      description: 如果适用，添加截图帮助说明问题

  - type: checkboxes
    id: terms
    attributes:
      label: 确认信息
      options:
        - label: 我已经搜索了现有的 Issues，确认这是一个新问题
          required: true
        - label: 我已经尝试使用最新版本，问题仍然存在
          required: false
